name: CI

# Runs on GitHub's cloud runners so build health doesn't depend on the
# Windows deploy target being online. Catches type errors and broken
# builds on every push and PR, independent of deploy.yml below.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run lint

      - name: Build
        run: npm run build
